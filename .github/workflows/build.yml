name: Build APK

# Builds the Android debug APK on every push. The job FAILS if the build fails,
# and the APK is uploaded as a downloadable artifact ("nuviomobile-full-debug").
# Optional: set repo secrets SUPABASE_URL / SUPABASE_ANON_KEY to bake login into the CI APK.

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Configure local.properties
        run: |
          {
            echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}"
            echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}"
          } >> local.properties

      - name: Build debug APK
        run: ./gradlew :androidApp:assembleFullDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nuviomobile-full-debug
          path: androidApp/build/outputs/apk/full/debug/*.apk
          if-no-files-found: error
